services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kistbook
      POSTGRES_PASSWORD: kistbook
      POSTGRES_DB: kistbook
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kistbook"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kistbook:kistbook@db:5432/kistbook
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    command: uvicorn kistbook.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kistbook:kistbook@db:5432/kistbook
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./kistbook:/app/kistbook
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: celery -A kistbook.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kistbook:kistbook@db:5432/kistbook
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    build: .
    command: celery -A kistbook.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kistbook:kistbook@db:5432/kistbook
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pg_data:
